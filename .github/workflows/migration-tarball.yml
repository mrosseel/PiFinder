name: Build Migration Tarball

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. 2.5.0)"
        required: true
        type: string

jobs:
  build-tarball:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            extra-platforms = aarch64-linux
            extra-system-features = big-parallel

      - name: Setup Cachix
        uses: cachix/cachix-action@v15
        with:
          name: pifinder
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Register QEMU binfmt for aarch64
        run: sudo apt-get update && sudo apt-get install -y qemu-user-static

      - name: Determine version
        id: version
        run: echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"

      - name: Build NixOS SD image
        run: |
          nix build github:mrosseel/PiFinder/nixos#images.pifinder \
            --system aarch64-linux \
            -L --no-link --print-out-paths > /tmp/image_path

      - name: Extract boot and rootfs from image
        run: |
          IMAGE_PATH=$(cat /tmp/image_path)
          IMAGE_FILE=$(find "${IMAGE_PATH}" -name "*.img" -o -name "*.img.zst" | head -1)

          if [[ "${IMAGE_FILE}" == *.zst ]]; then
            zstd -d "${IMAGE_FILE}" -o /tmp/pifinder.img
          else
            cp "${IMAGE_FILE}" /tmp/pifinder.img
          fi

          LOOP=$(sudo losetup --find --show --partscan /tmp/pifinder.img)
          echo "LOOP=${LOOP}" >> "$GITHUB_ENV"

          sudo mkdir -p /mnt/boot /mnt/root
          sudo mount "${LOOP}p1" /mnt/boot
          sudo mount "${LOOP}p2" /mnt/root

          mkdir -p /tmp/tarball-staging
          sudo cp -a /mnt/boot /tmp/tarball-staging/boot
          sudo cp -a /mnt/root /tmp/tarball-staging/rootfs

          sudo umount /mnt/boot /mnt/root
          sudo losetup -d "${LOOP}"
          rm -f /tmp/pifinder.img

      - name: Create migration tarball
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TARBALL="pifinder-nixos-v${VERSION}.tar.gz"

          cat > /tmp/tarball-staging/manifest.json <<EOF
          {
            "version": "${VERSION}",
            "created": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "boot_label": "FIRMWARE",
            "root_label": "NIXOS_SD"
          }
          EOF

          tar -C /tmp/tarball-staging -czf "/tmp/${TARBALL}" boot rootfs manifest.json

          echo "TARBALL=/tmp/${TARBALL}" >> "$GITHUB_ENV"
          echo "TARBALL_NAME=${TARBALL}" >> "$GITHUB_ENV"

          sha256sum "/tmp/${TARBALL}" | awk '{print $1}' > "/tmp/${TARBALL}.sha256"
          echo "SHA256=$(cat /tmp/${TARBALL}.sha256)" >> "$GITHUB_ENV"

          SIZE_MB=$(( $(stat -c%s "/tmp/${TARBALL}") / 1048576 ))
          echo "SIZE_MB=${SIZE_MB}" >> "$GITHUB_ENV"

          echo "### Migration Tarball Built" >> "$GITHUB_STEP_SUMMARY"
          echo "- **File:** ${TARBALL}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Size:** ${SIZE_MB} MB" >> "$GITHUB_STEP_SUMMARY"
          echo "- **SHA256:** \`$(cat /tmp/${TARBALL}.sha256)\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.TARBALL_NAME }}
          path: |
            ${{ env.TARBALL }}
            ${{ env.TARBALL }}.sha256

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}-migration
          name: PiFinder NixOS Migration v${{ steps.version.outputs.version }}
          body: |
            Full NixOS rootfs tarball for migration from Raspbian.

            **Size:** ${{ env.SIZE_MB }} MB
            **SHA256:** `${{ env.SHA256 }}`
          files: |
            ${{ env.TARBALL }}
            ${{ env.TARBALL }}.sha256
